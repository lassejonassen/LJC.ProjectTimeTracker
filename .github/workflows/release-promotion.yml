name: CD - Release Promotion

on:
  release:
    types: [ published ]

jobs:
  # --- STAGE 1: BUILD THE OFFICIAL ARTIFACT ---
  build-release:
    name: Build SemVer Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ljt-project-time-tracker
          tags: |
            # Extracts 'v1.2.3' from the GitHub Release tag
            type=semver,pattern={{version}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/ProjectTimeTracker.WebAPI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

