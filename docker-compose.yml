services:
  # The SQL Server 2025 Service
  sql.db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql_server_2025
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"

  # Your existing Web API
  projecttimetracker.webapi:
    image: ${DOCKER_REGISTRY-}projecttimetrackerwebapi
    build:
      context: .
      dockerfile: src/ProjectTimeTracker.WebAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Server=sql_server_2025;Database=TimeTrackerDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
    depends_on:
      - sql.db